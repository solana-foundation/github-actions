name: "Verify Build"
description: "Verifies a Solana program build matches its source code"
inputs:
  program-id:
    description: "Program ID to verify"
    required: true
  program:
    description: "Program name"
    required: true
  rpc-url:
    description: "Solana RPC URL"
    required: true
  keypair:
    description: "The keypair with authority to write verify data"
    required: true
  skip-build:
    description: "Skip building the program"
    required: false
    default: "true"
  skip-prompt:
    description: "Skip interactive questions"
    required: false
    default: "true"
  repo-url:
    description: "GitHub repository URL"
    required: true
  commit-hash:
    description: "Git commit hash to verify against"
    required: false
  mount-path:
    description: "Path to the program directory"
    required: false
  network:
    description: "Target network (mainnet/devnet)"
    required: true
  use-squads:
    description: "Whether to use Squads for deployment"
    required: false
    default: "false"
  vault-address:
    description: "The Squads vault address (required if use-squads is true)"
    required: false
  base-image:
    description: "Override solana-verify's --base-image. Must match
      build-verified to keep the verify-PDA aligned with the built .so."
    required: false
    default: ""
  features:
    description: "Comma-separated cargo features. Must match build-verified
      to keep the verify-PDA aligned with the built .so."
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    - name: Write keypair
      shell: bash
      run: |
        echo "$DEPLOY_KEYPAIR" > ./deploy-keypair.json
        chmod 600 ./deploy-keypair.json
      env:
        DEPLOY_KEYPAIR: ${{ inputs.keypair }}

    - name: Debug Environment
      shell: bash
      env:
        EVENT_NETWORK: ${{ github.event.inputs.network }}
        EVENT_VERIFY: ${{ github.event.inputs.verify }}
        HAS_KEYPAIR: ${{ inputs.keypair != '' }}
      run: |
        echo "Network: $EVENT_NETWORK"
        echo "Verify: $EVENT_VERIFY"
        echo "Has keypair: $HAS_KEYPAIR"

    - name: Verify Build
      shell: bash
      if: inputs.use-squads == 'false'
      env:
        SKIP_BUILD: ${{ inputs.skip-build }}
        SKIP_PROMPT: ${{ inputs.skip-prompt }}
        MOUNT_PATH: ${{ inputs.mount-path }}
        COMMIT_HASH: ${{ inputs.commit-hash }}
        NETWORK: ${{ inputs.network }}
        BASE_IMAGE: ${{ inputs.base-image }}
        FEATURES_INPUT: ${{ inputs.features }}
        PROGRAM_ID: ${{ inputs.program-id }}
        RPC_URL: ${{ inputs.rpc-url }}
        PROGRAM: ${{ inputs.program }}
        REPO_URL: ${{ inputs.repo-url }}
      run: |
        ARGS=""

        if [ "$SKIP_BUILD" = "true" ]; then
          ARGS="$ARGS --skip-build"
        fi

        if [ "$SKIP_PROMPT" = "true" ]; then
          ARGS="$ARGS --skip-prompt"
        fi

        if [ -n "$MOUNT_PATH" ]; then
          ARGS="$ARGS --mount-path $MOUNT_PATH"
        fi

        if [ -n "$COMMIT_HASH" ]; then
          ARGS="$ARGS --commit-hash $COMMIT_HASH"
        fi

        if [ "$NETWORK" = "mainnet" ]; then
          ARGS="$ARGS --remote"
        fi

        if [ -n "$BASE_IMAGE" ]; then
          ARGS="$ARGS --base-image $BASE_IMAGE"
        fi

        CARGO_ARGS=""
        if [ -n "$FEATURES_INPUT" ]; then
          CARGO_ARGS="-- --features $FEATURES_INPUT"
        fi

        solana-verify verify-from-repo \
          --program-id "$PROGRAM_ID" \
          --url "$RPC_URL" \
          --library-name "$PROGRAM" \
          -k ./deploy-keypair.json \
          $ARGS \
          "$REPO_URL" \
          $CARGO_ARGS

    - name: Export PDA Transaction
      id: export-pda
      if: inputs.use-squads == 'true'
      shell: bash
      env:
        BASE_IMAGE: ${{ inputs.base-image }}
        FEATURES_INPUT: ${{ inputs.features }}
        REPO_URL: ${{ inputs.repo-url }}
        PROGRAM_ID: ${{ inputs.program-id }}
        VAULT_ADDRESS: ${{ inputs.vault-address }}
        COMMIT_HASH: ${{ inputs.commit-hash }}
        RPC_URL: ${{ inputs.rpc-url }}
        PROGRAM: ${{ inputs.program }}
      run: |
        echo "=== Exporting PDA Transaction ==="

        BASE_IMAGE_ARG=""
        if [ -n "$BASE_IMAGE" ]; then
          BASE_IMAGE_ARG="--base-image $BASE_IMAGE"
        fi

        CARGO_ARGS=""
        if [ -n "$FEATURES_INPUT" ]; then
          CARGO_ARGS="-- --features $FEATURES_INPUT"
        fi

        # Get the last line which should be the base64 transaction
        TX=$(solana-verify export-pda-tx \
          "$REPO_URL" \
          --program-id "$PROGRAM_ID" \
          --uploader "$VAULT_ADDRESS" \
          --commit-hash "$COMMIT_HASH" \
          --url "$RPC_URL" \
          --library-name "$PROGRAM" \
          $BASE_IMAGE_ARG \
          --encoding base64 \
          $CARGO_ARGS | tail -n 1)

        # Verify we got a base64 string
        if [[ ! "$TX" =~ ^[A-Za-z0-9+/=]*$ ]]; then
          echo "Error: Invalid base64 transaction"
          echo "Got: $TX"
          exit 1
        fi

        echo "tx=$TX" >> $GITHUB_OUTPUT

    - name: Cleanup keypair
      shell: bash
      if: always()
      run: rm -f ./deploy-keypair.json

outputs:
  pda_tx:
    description: "PDA verification transaction (only set if use-squads is true)"
    value: ${{ steps.export-pda.outputs.tx }}

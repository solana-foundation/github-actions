name: "Build Verified"
description: "Builds a Solana program using solana-verify"
inputs:
  program:
    description: "The program to build and upload"
    required: true
  features:
    description: "Features to enable during build"
    required: false
    default: ""
  base-image:
    description: "Override solana-verify's --base-image. Pass the same value
      to verify-build to keep the verify-PDA aligned."
    required: false
    default: ""

runs:
  using: "composite"
  steps:
    # Add Docker socket mounting
    - name: Setup Docker
      shell: bash
      run: |
        sudo chmod 666 /var/run/docker.sock

    - name: Build Verified
      shell: bash
      run: |
        FEATURES="${{ inputs.features }}"
        if [ -n "$FEATURES" ]; then
          FEATURES="--features $FEATURES"
        fi
        BASE_IMAGE_ARG=""
        if [ -n "${{ inputs.base-image }}" ]; then
          BASE_IMAGE_ARG="--base-image ${{ inputs.base-image }}"
        fi
        # Run solana-verify directly without Docker
        ~/.cargo/bin/solana-verify build $BASE_IMAGE_ARG --library-name ${{ inputs.program }} -- $FEATURES
